# Render blueprint — free-tier Docker deploy. No persistent disk needed:
# user persistence lives in the browser (localStorage) and server sessions
# are transient. Measured footprint ~220 MB RSS with the model warm, so the
# free 512 MB instance is sufficient.
services:
  - type: web
    name: bulletrevisor
    runtime: docker
    plan: free             # sleeps after ~15 min idle; upgrade to starter ($7/mo) to stay warm
    healthCheckPath: /
    envVars:
      - key: DATA_DIR
        value: /tmp/data
      - key: FLASK_DEBUG
        value: "0"
