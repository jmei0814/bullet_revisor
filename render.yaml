# Render blueprint — optional paid alternative to the free Hugging Face Space.
# No persistent disk needed: user persistence lives in the browser
# (localStorage) and server sessions are transient.
services:
  - type: web
    name: bulletrevisor
    runtime: docker
    plan: starter          # 512 MB RAM; the ML model + LaTeX need >256 MB
    healthCheckPath: /
    envVars:
      - key: DATA_DIR
        value: /tmp/data
      - key: FLASK_DEBUG
        value: "0"
